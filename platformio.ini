; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html


[env:lolin_s2_mini]
platform = espressif32
board = lolin_s2_mini
framework = arduino

monitor_speed = 115200

; Keep your partitions if you rely on them
board_build.partitions = default.csv

; S2 has native USB (TinyUSB). These two are important.
build_flags =  
  -D ARDUINO_USB_MODE=0            ; disable tinyusb device stack
  ; -D ARDUINO_USB_CDC_ON_BOOT=0
  -Wl,-Map,firmware.map


; Remove PSRAM-related settings (LOLIN S2 Mini has no PSRAM)
; board_build.psram_type =   ; (delete)
; -DBOARD_HAS_PSRAM          ; (delete)

; Usually not needed—board file defines flash size/mode. If you want, keep 4MB.
board_upload.flash_size = 4MB

lib_extra_dirs =
  /Users/jkiesele/projects_priv/ESPlibs

lib_deps =
  arduino-libraries/NTPClient
  ; adafruit/Adafruit NeoPixel (deleted, no NeoPixel on LOLIN S2 Mini)
  paulstoffregen/OneWire
  milesburton/DallasTemperature
  https://github.com/beegee-tokyo/DHTesp.git#master

lib_ldf_mode = deep+